<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Нет соединения — TrashGo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      font-family: 'Inter', system-ui, sans-serif;
      color: #111827;
      padding: 1.5rem;
    }
    .card {
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #e5e7eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
    }
    h1 { font-size: 1.375rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.9375rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    .tips {
      background: #f3f4f6;
      border-radius: 0.75rem;
      padding: 0.875rem 1rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .tips-title { font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
    .tips ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.3rem; }
    .tips li { font-size: 0.8rem; color: #6b7280; }
    .tips li::before { content: '· '; }
    button {
      width: 100%;
      padding: 0.875rem;
      background: #22a849;
      color: white;
      border: none;
      border-radius: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.82; }
    .hint { margin-top: 1rem; font-size: 0.8125rem; color: #9ca3af; }

    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
      .icon { background: #1f2937; }
      p { color: #9ca3af; }
      .tips { background: #1f2937; }
      .tips-title { color: #d1d5db; }
      .tips li { color: #9ca3af; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Нет соединения</h1>
    <p>Не удаётся подключиться к TrashGo. Проверьте интернет и попробуйте ещё раз.</p>
    <div class="tips">
      <div class="tips-title">Что попробовать:</div>
      <ul>
        <li>Проверьте Wi-Fi или мобильные данные</li>
        <li>Перезагрузите страницу через несколько секунд</li>
        <li>Попробуйте авиарежим и обратно</li>
      </ul>
    </div>
    <button onclick="location.reload()">Попробовать снова</button>
    <div class="hint">TrashGo · Казань</div>
  </div>
</body>
</html>
